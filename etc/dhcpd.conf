# Globale Optionen
option domain-name-servers 192.168.1.1;
option routers 192.168.1.1;
option ntp-servers 192.168.1.1;
ddns-update-style none;
default-lease-time 3600;

# Definition der Architektur-Option (Wichtig für das IF-Statement unten)
option arch code 93 = unsigned integer 16; 

subnet 192.168.1.0 netmask 255.255.255.0 {
    next-server 192.168.1.1; # IP deines SLES-PXE-Servers
    range 192.168.1.100 192.168.1.199;
    max-lease-time 3600;

    # Architektur-Abfrage
    if option arch = 00:07 or option arch = 00:09 {
        # x86_64 UEFI
        filename "/EFI/x86/grub.efi";
        #filename "EFI/x86/grub.efi";
    } 
    else if option arch = 00:0b {
        # ARM 64-bit (11 dezimal ist 0b hexadezimal)
        # Stelle sicher, dass der Pfad mit deiner TFTP-Struktur übereinstimmt
        # filename "/EFI/aarch64/bootaa64.efi";
        filename "/EFI/aarch64/grubaa64.efi";
        #filename "EFI/aarch64/grubaa64.efi";
    } 
    else {
        # Fallback für Legacy BIOS (x86)
        filename "/BIOS/x86/pxelinux.0";
        #filename "BIOS/x86/pxelinux.0";
    }
}
